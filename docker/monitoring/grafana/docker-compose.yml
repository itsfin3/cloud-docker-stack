services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: on-failure:5
    user: "root"
    ports:
      - "3000:3000"
    environment:
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /certs/live/${DOMAIN}/fullchain.pem
      GF_SERVER_CERT_KEY: /certs/live/${DOMAIN}/privkey.pem
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /srv/docker/monitoring/grafana/data:/var/lib/grafana
      - /etc/letsencrypt:/certs:ro
    networks:
      - server-net

networks:
  server-net:
    external: true
