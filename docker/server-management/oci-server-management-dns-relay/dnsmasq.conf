# Relay-only dnsmasq: resolves docker container names via the embedded
# resolver (127.0.0.11, only visible from inside a container on the same
# network), falls back to public DNS for everything else. Source of truth
# for what dns-relay actually runs - Portainer's git-linked stacks only
# fetch the compose file itself, not sibling files, so this must be copied
# to the host manually (and again any time it changes), same pattern as
# plus-infrastructure/docker/openvpn's init.sh:
#
#   mkdir -p /srv/docker/server-management/oci-server-management-dns-relay
#   cp docker/server-management/oci-server-management-dns-relay/dnsmasq.conf /srv/docker/server-management/oci-server-management-dns-relay/dnsmasq.conf
#
no-resolv
no-hosts
server=127.0.0.11
server=1.1.1.1
listen-address=0.0.0.0
# Without this, a failed/empty lookup at boot (embedded resolver 127.0.0.11
# not fully live for all 4 networks yet) gets cached as a negative answer
# and stays broken until the container is restarted. Container names should
# always be resolved live anyway (dynamic IPs).
no-negcache
# Multi-homed (4 bridge networks) - without this, dnsmasq's reply can go
# out with the wrong source IP (picked by default route, not the interface
# the query arrived on), and clients silently drop a reply that doesn't
# match who they queried. bind-interfaces binds per-interface so replies
# always match.
bind-interfaces
