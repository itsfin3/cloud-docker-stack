services:
  oci-server-management-dns-relay:
    image: 4km3/dnsmasq:latest
    container_name: oci-server-management-dns-relay
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - /srv/docker/server-management/oci-server-management-dns-relay/dnsmasq.conf:/etc/dnsmasq.conf:ro
    # Joined to every network that has containers wg-main's clients should be
    # able to resolve by name - each container_name becomes a DNS name for
    # free via the embedded resolver relay (see dnsmasq.conf), no static
    # hostname list to maintain. Only oci-hobby-wg-private carries a pinned
    # IP: that's the one address wg-main's WG_DEFAULT_DNS points clients at,
    # so it needs to be a known constant. The others just need membership.
    networks:
      server-net:
      oci-hobby-wg-private:
        ipv4_address: ${DNS_RELAY_BRIDGE_IP}
      oci-hobby-wg-public:
      plus-infra-net:

networks:
  server-net:
    external: true
  oci-hobby-wg-private:
    external: true
  oci-hobby-wg-public:
    external: true
  plus-infra-net:
    external: true
