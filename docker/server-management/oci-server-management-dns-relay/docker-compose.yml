services:
  oci-server-management-dns-relay:
    image: 4km3/dnsmasq:latest
    container_name: oci-server-management-dns-relay
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    volumes:
      - /srv/docker/server-management/oci-server-management-dns-relay/dnsmasq.conf:/etc/dnsmasq.conf:ro
    # Joined to every network that has containers wg-main's clients should be
    # able to resolve by name - each container_name becomes a DNS name for
    # free via the embedded resolver relay (see dnsmasq.conf), no static
    # hostname list to maintain. Only server-net carries a pinned IP: that's
    # the one address wg-main's WG_DEFAULT_DNS points clients at, so it needs
    # to be a known constant - and critically, it must fall inside wg-main's
    # WG_ALLOWED_IPS or client OS's never route DNS queries into the tunnel
    # at all (server-net is; the hobby-wg bridges aren't, clients only need
    # the actual WG tunnel ranges behind those, not the bridges themselves).
    # The other 3 networks just need membership, no pinned IP required.
    networks:
      server-net:
        ipv4_address: ${DNS_RELAY_BRIDGE_IP}
      oci-hobby-wg-private:
      oci-hobby-wg-public:
      plus-infra-net:

networks:
  server-net:
    external: true
  oci-hobby-wg-private:
    external: true
  oci-hobby-wg-public:
    external: true
  plus-infra-net:
    external: true
