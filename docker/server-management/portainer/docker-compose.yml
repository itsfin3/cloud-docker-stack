services:
  portainer:
    image: portainer/portainer-ee:latest
    container_name: portainer
    restart: unless-stopped
    command: --tlscert /certs/live/${DOMAIN}/fullchain.pem --tlskey /certs/live/${DOMAIN}/privkey.pem
    ports:
      - "${BIND_IP}:${PORTAINER_PORT}:9443"
      - "127.0.0.1:${PORTAINER_PORT}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/docker/server-management/portainer/data:/data
      - /etc/letsencrypt:/certs:ro
    networks:
      - server-net

networks:
  server-net:
    external: true
