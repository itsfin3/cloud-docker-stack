services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: on-failure:5
    command: --tlscert /certs/live/${DOMAIN}/fullchain.pem --tlskey /certs/live/${DOMAIN}/privkey.pem
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /srv/docker/server-management/portainer/data:/data
      - /etc/letsencrypt:/certs:ro
    networks:
      - server-net

networks:
  server-net:
    external: true
