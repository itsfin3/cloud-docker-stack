server:
  interface: 0.0.0.0
  port: 53
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes
  access-control: 0.0.0.0/0 allow
  # No local zone/hosts data - pure forwarder, so no risk of it trying to
  # answer anything itself and getting it wrong.
  cache-min-ttl: 0
  cache-max-ttl: 86400

forward-zone:
  name: "."
  forward-tls-upstream: yes
  forward-addr: 1.1.1.1@853#cloudflare-dns.com
  forward-addr: 1.0.0.1@853#cloudflare-dns.com
