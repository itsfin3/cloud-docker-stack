services:
  wg-easy-public:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy-public
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - WG_PORT=${WG_PORT}
      - PORT=${WG_UI_PORT}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE}
      - WG_POST_UP=iptables -t nat -A POSTROUTING -s ${WG_SUBNET} -o eth0 -j MASQUERADE; iptables -A FORWARD -i wg0 -o wg0 -j DROP; iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; iptables -I INPUT -i wg0 -d ${WG_GATEWAY_IP} -j DROP; iptables -I INPUT -i wg0 -s ${WG_OWNER_IP} -d ${WG_GATEWAY_IP} -j ACCEPT
      - WG_PRE_DOWN=iptables -D INPUT -i wg0 -s ${WG_OWNER_IP} -d ${WG_GATEWAY_IP} -j ACCEPT; iptables -D INPUT -i wg0 -d ${WG_GATEWAY_IP} -j DROP; iptables -D FORWARD -o wg0 -j ACCEPT; iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -i wg0 -o wg0 -j DROP; iptables -t nat -D POSTROUTING -s ${WG_SUBNET} -o eth0 -j MASQUERADE
    volumes:
      - /srv/docker/hobby/wg-easy-public/data:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "127.0.0.1:${WG_UI_PORT}:${WG_UI_PORT}/tcp"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - wg-hobby-public

networks:
  wg-hobby-public:
    driver: bridge
