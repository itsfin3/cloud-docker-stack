services:
  wg-easy-hobby:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy-hobby
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - WG_PORT=${WG_PORT}
      - PORT=${WG_UI_PORT}
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS}
      - WG_PERSISTENT_KEEPALIVE=${WG_PERSISTENT_KEEPALIVE}
      - WG_POST_UP=iptables -A FORWARD -i wg0 -d 10.10.0.0/24 -j DROP; iptables -A FORWARD -i wg0 -d 30.30.0.0/24 -j DROP; iptables -A FORWARD -i wg0 -d 127.0.0.0/8 -j DROP; iptables -A FORWARD -i wg0 -d 10.0.0.0/8 -j DROP; iptables -A FORWARD -i wg0 -d 172.16.0.0/12 -j DROP; iptables -A FORWARD -i wg0 -d 192.168.0.0/16 -j DROP; iptables -I INPUT -i wg0 -d ${WG_GATEWAY_IP} -j DROP; iptables -I INPUT -i wg0 -s ${WG_UI_ACCESS_IP} -d ${WG_GATEWAY_IP} -j ACCEPT
      - WG_PRE_DOWN=iptables -D INPUT -i wg0 -s ${WG_UI_ACCESS_IP} -d ${WG_GATEWAY_IP} -j ACCEPT; iptables -D INPUT -i wg0 -d ${WG_GATEWAY_IP} -j DROP; iptables -D FORWARD -i wg0 -d 192.168.0.0/16 -j DROP; iptables -D FORWARD -i wg0 -d 172.16.0.0/12 -j DROP; iptables -D FORWARD -i wg0 -d 10.0.0.0/8 -j DROP; iptables -D FORWARD -i wg0 -d 127.0.0.0/8 -j DROP; iptables -D FORWARD -i wg0 -d 30.30.0.0/24 -j DROP; iptables -D FORWARD -i wg0 -d 10.10.0.0/24 -j DROP
    volumes:
      - /srv/docker/hobby/wg-easy/data:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "127.0.0.1:${WG_UI_PORT}:${WG_UI_PORT}/tcp"
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - wg-hobby-private

networks:
  wg-hobby-private:
    driver: bridge
