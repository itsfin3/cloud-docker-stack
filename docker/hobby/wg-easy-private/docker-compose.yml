services:
  wg-easy-hobby:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy-hobby
    restart: unless-stopped
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD_HASH=${WG_PASSWORD_HASH}
      - WG_PORT=51822
      - PORT=51823
      - WG_DEFAULT_ADDRESS=${WG_DEFAULT_ADDRESS}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS}
      - WG_ALLOWED_IPS=20.20.0.0/24
      - WG_PERSISTENT_KEEPALIVE=25
      - WG_POST_UP=iptables -I INPUT -i wg0 -d 20.20.0.1 -j DROP; iptables -I INPUT -i wg0 -s 20.20.0.2 -d 20.20.0.1 -j ACCEPT
      - WG_PRE_DOWN=iptables -D INPUT -i wg0 -s 20.20.0.2 -d 20.20.0.1 -j ACCEPT; iptables -D INPUT -i wg0 -d 20.20.0.1 -j DROP
    volumes:
      - /srv/docker/hobby/wg-easy/data:/etc/wireguard
    ports:
      - "51822:51822/udp"
      - "51823:51823/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - wg-hobby-private

networks:
  wg-hobby-private:
    driver: bridge
